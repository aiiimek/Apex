name: Build & Release Windows Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows-installer:
    name: Build .exe installer on Windows
    runs-on: windows-latest

    permissions:
      contents: write   # potrzebne do tworzenia Release i uploadu assets

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout kodu
      # ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Konfiguracja JDK 21 (Temurin, zawiera jpackage)
      # ─────────────────────────────────────────────
      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # ─────────────────────────────────────────────
      # 3. Budowanie Fat JAR przez Maven
      # ─────────────────────────────────────────────
      - name: Build Fat JAR with Maven
        run: mvn --batch-mode clean package -DskipTests

      # ─────────────────────────────────────────────
      # 4. Generowanie instalatora .exe (jpackage)
      #    DODANO: --icon src/main/resources/images/icon.ico
      # ─────────────────────────────────────────────
      - name: Generate Windows .exe Installer
        run: >-
          jpackage
          --type exe
          --name "Apex"
          --app-version "1.0.0"
          --vendor "aiiimek"
          --description "Apex SSH & SFTP Remote Commander"
          --about-url "https://github.com/aiiimek/Apex"
          --copyright "Copyright 2026 aiiimek"
          --icon src/main/resources/images/icon.ico
          --input target
          --main-jar apex-1.0.0-SNAPSHOT-shaded.jar
          --main-class com.apex.app.Main
          --dest installer-output
          --win-dir-chooser
          --win-shortcut
          --win-menu
          --win-menu-group "Apex"
          --win-per-user-install

      # ─────────────────────────────────────────────
      # 5. Zmiana nazwy instalatora na czyste Apex.exe (Bash)
      # ─────────────────────────────────────────────
      - name: Rename Installer to Apex.exe
        run: mv installer-output/Apex*.exe installer-output/Apex.exe
        shell: bash

      # ─────────────────────────────────────────────
      # 6. Publikacja GitHub Release z plikiem .exe
      #    ZMIENIONO: files wskazuje teraz na czyste Apex.exe
      # ─────────────────────────────────────────────
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Apex ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: installer-output/Apex.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}