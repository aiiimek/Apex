name: Build & Release Windows Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows-installer:
    name: Build .exe installer on Windows
    runs-on: windows-latest

    permissions:
      contents: write   # potrzebne do tworzenia Release i uploadu assets

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout kodu
      # ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Konfiguracja JDK 21 (Temurin, zawiera jpackage)
      # ─────────────────────────────────────────────
      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # ─────────────────────────────────────────────
      # 3. Budowanie Fat JAR przez Maven
      #    Wynik: target/apex-1.0.0-SNAPSHOT.jar
      #           target/apex-1.0.0-SNAPSHOT-shaded.jar
      # ─────────────────────────────────────────────
      - name: Build Fat JAR with Maven
        run: mvn --batch-mode clean package -DskipTests

      # ─────────────────────────────────────────────
      # 4. Generowanie instalatora .exe (jpackage)
      #    Nie wymaga jlink/modularności — działa z fat JARem.
      #    Wynik: Apex-1.0.0.exe w katalogu roboczym (.)
      # ─────────────────────────────────────────────
      - name: Generate Windows .exe Installer
        run: >-
          jpackage
          --type exe
          --name "Apex"
          --app-version "1.0.0"
          --vendor "aiiimek"
          --description "Apex SSH & SFTP Remote Commander"
          --about-url "https://github.com/aiiimek/Apex"
          --copyright "Copyright 2026 aiiimek"
          --input target
          --main-jar apex-1.0.0-SNAPSHOT-shaded.jar
          --main-class com.apex.app.Main
          --dest installer-output
          --win-dir-chooser
          --win-shortcut
          --win-menu
          --win-menu-group "Apex"
          --win-per-user-install

      # ─────────────────────────────────────────────
      # 5. Debug — wylistowanie wygenerowanych plików
      # ─────────────────────────────────────────────
      - name: List generated installer files
        run: Get-ChildItem installer-output\ | Select-Object Name, Length
        shell: powershell

      # ─────────────────────────────────────────────
      # 6. Publikacja GitHub Release z plikiem .exe
      # ─────────────────────────────────────────────
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Apex ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: installer-output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
